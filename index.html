<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeasonPing</title>

<style>
body{
font-family: Arial;
background:#111827;
color:white;
text-align:center;
padding:40px;
}

input{
padding:10px;
font-size:16px;
width:250px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
font-size:16px;
border-radius:8px;
border:none;
background:#6366f1;
color:white;
cursor:pointer;
}

.result{
background:#1f2937;
margin:10px auto;
padding:15px;
width:300px;
border-radius:10px;
}

img{
width:120px;
border-radius:8px;
}
</style>
</head>

<body>

<h1>📺 SeasonPing</h1>

<input id="searchBox" placeholder="Search TV show">
<button onclick="searchShow()">Search</button>

<div id="results"></div>

<script>

const API_KEY = "6eff43595961944125fe11743028dc62";

async function searchShow(){

let query = document.getElementById("searchBox").value;

let response = await fetch(
"https://api.themoviedb.org/3/search/tv?api_key="+API_KEY+"&query="+query
);

let data = await response.json();

let results = document.getElementById("results");
results.innerHTML="";

data.results.slice(0,5).forEach(show=>{

let poster="";
if(show.poster_path){
poster="<img src='https://image.tmdb.org/t/p/w500"+show.poster_path+"'>";
}

results.innerHTML +=
"<div class='result'><h3>"+show.name+"</h3>"+poster+"<p>"+(show.first_air_date||"No date")+"</p></div>";

});

}

</script>

</body>
</html>
